  nethsm-test:
    image: nethsm-dev
    depends_on:
      - nethsm1
      - nethsm2
      - nethsm3
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |-
        curl -f -k -s -w '\n' https://nethsm1/api/v1/info
        curl -f -k -s -w '\n' https://nethsm2/api/v1/info
        curl -f -k -s -w '\n' https://nethsm3/api/v1/info
        sleep 1000
    networks:
      - nethsm

networks:
  nethsm:
    internal: true
    ipam:
      driver: default
      config:
        - subnet: "172.22.1.0/24"
  int1:
    internal: true
  int2:
    internal: true
  int3:
    internal: true
  int4:
    internal: true
volumes:
  data:
