name: nethsm-cluster

services:
  nethsm1:
    build:
      context: ../../..
      dockerfile: src/container/alpine/Dockerfile
      target: nethsm_test
      tags:
        - nethsm-dev
    networks:
      nethsm:
        interface_name: eth0
        ipv4_address: 172.22.1.2
      int1:
        interface_name: eth1
        link_local_ips:
          - 169.254.169.1
    # environment: {}
    cap_add:
      - NET_ADMIN
    depends_on:
      - etcd1
  etcd1:
    image: "quay.io/coreos/etcd:v3.6.5"
    networks:
      int1:
        link_local_ips:
          - 169.254.169.2
    command: >
      etcd
        --listen-client-urls "http://169.254.169.2:2379"
        --advertise-client-urls "http://169.254.169.2:2379"
        --data-dir /etcd-data/etcd1
        --host-whitelist "169.254.169.1"
        --max-txn-ops 512
    # --log-level debug
    volumes:
      - data:/etcd-data

  nethsm2:
    image: nethsm-dev
    networks:
      nethsm:
        interface_name: eth0
        ipv4_address: 172.22.1.3
      int2:
        interface_name: eth1
        link_local_ips:
          - 169.254.169.1
    # environment: {}
    cap_add:
      - NET_ADMIN
    depends_on:
      - nethsm1
      - etcd2
  etcd2:
    image: "quay.io/coreos/etcd:v3.6.5"
    networks:
      int2:
        link_local_ips:
          - 169.254.169.2
    command: >
      etcd
        --listen-client-urls "http://169.254.169.2:2379"
        --advertise-client-urls "http://169.254.169.2:2379"
        --data-dir /etcd-data/etcd2
        --host-whitelist "169.254.169.1"
        --max-txn-ops 512
    # --log-level debug
    volumes:
      - data:/etcd-data

  nethsm3:
    image: nethsm-dev
    networks:
      nethsm:
        interface_name: eth0
        ipv4_address: 172.22.1.4
      int3:
        interface_name: eth1
        link_local_ips:
          - 169.254.169.1
    # environment: {}
    cap_add:
      - NET_ADMIN
    depends_on:
      - nethsm1
      - etcd3
  etcd3:
    image: "quay.io/coreos/etcd:v3.6.5"
    networks:
      int3:
        link_local_ips:
          - 169.254.169.2
    command: >
      etcd
        --listen-client-urls "http://169.254.169.2:2379"
        --advertise-client-urls "http://169.254.169.2:2379"
        --data-dir /etcd-data/etcd3
        --host-whitelist "169.254.169.1"
        --max-txn-ops 512
    # --log-level debug
    volumes:
      - data:/etcd-data

