name: nethsm-cluster

services:
  nethsm1:
    hostname: nethsm1
    image: nitrokey/nethsm:test-clustering
    build:
      context: ../../..
      dockerfile: src/container/alpine/Dockerfile
      target: nethsm_test
    networks:
      nethsm:
        interface_name: eth0
        ipv4_address: 172.22.1.2
        ipv6_address: "fc00:22:1::2"
    # environment: {}
    volumes:
      - ./data/nethsm1:/data
    cap_add:
      - NET_ADMIN

  nethsm2:
    hostname: nethsm2
    image: nitrokey/nethsm:test-clustering
    networks:
      nethsm:
        interface_name: eth0
        ipv4_address: 172.22.1.3
        ipv6_address: "fc00:22:1::3"
    # environment: {}
    volumes:
      - ./data/nethsm2:/data
    cap_add:
      - NET_ADMIN

  nethsm3:
    hostname: nethsm3
    image: nitrokey/nethsm:test-clustering
    networks:
      nethsm:
        interface_name: eth0
        ipv4_address: 172.22.1.4
        ipv6_address: "fc00:22:1::4"
    # environment: {}
    volumes:
      - ./data/nethsm3:/data
    cap_add:
      - NET_ADMIN

  nethsm4:
    hostname: nethsm4
    image: nitrokey/nethsm:test-clustering
    networks:
      nethsm:
        interface_name: eth0
        ipv4_address: 172.22.1.5
        ipv6_address: "fc00:22:1::5"
    # environment: {}
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data/nethsm4:/data

  etcd-witness:
    hostname: etcd-wittness
    image: "quay.io/coreos/etcd:v3.6.5"
    networks:
      nethsm:
        interface_name: eth0
        ipv4_address: 172.22.1.10
        ipv6_address: "fc00:22:1::10"
    command: >
      etcd
        --data-dir=/etcd-data
        --listen-peer-urls=https://0.0.0.0:2380
        --max-txn-ops=512
        --peer-auto-tls
    # --cert-file=/run/secrets/etcd_server_cert
    # --key-file=/run/secrets/etcd_server_key
    # --trusted-ca-file=/run/secrets/ca_cert
    volumes:
      - ./data/etcd-witness:/etcd-data
    # secrets:
    #   - ca_cert
    #   - etcd_server_cert
    #   - etcd_server_key

  nethsm-test:
    image: nitrokey/nethsm:test-clustering
    pull_policy: never
    depends_on:
      - nethsm1
      - nethsm2
      - nethsm3
      - nethsm4
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |-
        echo -n "nethsm1: "
        curl -f -k -s -w '\n' https://nethsm1/api/v1/info
        echo -n "nethsm2: "
        curl -f -k -s -w '\n' https://nethsm2/api/v1/info
        echo -n "nethsm3: "
        curl -f -k -s -w '\n' https://nethsm3/api/v1/info
        echo -n "nethsm4: "
        curl -f -k -s -w '\n' https://nethsm4/api/v1/info
        sleep 1000
    networks:
      - nethsm

networks:
  nethsm:
    enable_ipv6: true
    internal: true
    ipam:
      driver: default
      config:
        - subnet: "fc00:22:1::/48"
        - subnet: "172.22.1.0/24"
volumes:
  data:
# secrets:
